<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rankings – ExamPro</title>
<script src="https://cdn.tailwindcss.com"></script>
<!-- results.html — </head> se pehle add karo -->
<script src="/static/js/toast.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { font-family:'Inter',sans-serif; }
  body { background:#020208; }
  .glass { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); }
  tr:hover td { background:rgba(99,102,241,0.06); }
  .rank-1 { background:linear-gradient(135deg,rgba(234,179,8,0.12),rgba(234,179,8,0.04)); border-color:rgba(234,179,8,0.3); }
  .rank-2 { background:linear-gradient(135deg,rgba(148,163,184,0.12),rgba(148,163,184,0.04)); border-color:rgba(148,163,184,0.3); }
  .rank-3 { background:linear-gradient(135deg,rgba(180,83,9,0.12),rgba(180,83,9,0.04)); border-color:rgba(180,83,9,0.3); }
</style>
</head>
<body class="min-h-screen text-gray-100">
<div id="toast-container" class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none max-w-sm w-full"></div>

<nav class="border-b border-white/5 px-6 py-4 flex items-center gap-4 sticky top-0 z-50 backdrop-blur-md"
  style="background:rgba(2,2,8,0.92)">
  <a href="javascript:history.back()"
    class="w-8 h-8 rounded-xl glass flex items-center justify-center text-gray-400 hover:text-white transition-colors">
    <i class="fas fa-arrow-left text-sm"></i>
  </a>
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-xl bg-yellow-500/15 border border-yellow-500/20 flex items-center justify-center">
      <i class="fas fa-ranking-star text-yellow-400 text-sm"></i>
    </div>
    <h1 class="text-white font-bold">Leaderboard</h1>
  </div>
  <span class="text-xs font-mono bg-indigo-900/50 text-indigo-300 px-2.5 py-1 rounded-full border border-indigo-700/40">
    {{ exam_id }}
  </span>
</nav>

<main class="max-w-3xl mx-auto px-4 py-8">
  <div id="podium" class="hidden mb-8"></div>
  <div class="glass rounded-2xl overflow-hidden">
    <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between">
      <h3 class="font-bold text-white text-sm flex items-center gap-2">
        <i class="fas fa-table text-indigo-400"></i> Full Leaderboard
      </h3>
      <span id="total-badge" class="text-xs text-gray-500"></span>
    </div>
    <div id="ranking-table">
      <div class="text-center py-16 text-gray-500">
        <i class="fas fa-spinner fa-spin text-3xl mb-3 block text-gray-600"></i>Loading…
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script src="/static/js/toast.js"></script>
<script src="/static/js/app.js"></script>
<script>
const EXAM_ID = '{{ exam_id }}';
const socket  = io();
socket.on('result_published', d => { if (d.exam_id===EXAM_ID) loadRanking(); });

const medals = ['🥇','🥈','🥉'];

async function loadRanking() {
  const { ok, data } = await apiGet(`/api/results/${EXAM_ID}`);
  if (!ok || !data.length) {
    document.getElementById('ranking-table').innerHTML = `
      <div class="text-center py-16 text-gray-500">
        <i class="fas fa-clock text-3xl mb-3 block text-gray-600"></i>
        <p class="font-medium text-gray-400">No results published yet.</p>
      </div>`;
    return;
  }

  document.getElementById('total-badge').textContent = `${data.length} students`;

  // Podium
  if (data.length >= 1) {
    const top = data.slice(0,3);
    const order = data.length >= 3 ? [1,0,2] : data.length === 2 ? [1,0] : [0];
    const heights = ['h-24','h-32','h-20'];
    const podiumColors = ['text-gray-300','text-yellow-400','text-amber-600'];

    document.getElementById('podium').innerHTML = `
      <div class="flex items-end justify-center gap-3 mb-2">
        ${order.map(idx => !top[idx] ? '<div class="flex-1 max-w-[140px]"></div>' : `
          <div class="flex-1 max-w-[140px] glass rounded-2xl p-4 text-center border
            ${idx===0?'rank-1':idx===1?'rank-2':'rank-3'}">
            <div class="text-3xl mb-2">${medals[idx]}</div>
            <p class="text-white font-bold text-sm truncate">${top[idx].name||'Student'}</p>
            <p class="text-gray-400 text-xs mt-0.5">${top[idx].roll_number||''}</p>
            <p class="text-2xl font-black mt-2 ${podiumColors[idx]}">${top[idx].total}</p>
            <p class="text-xs text-gray-500">marks</p>
          </div>`).join('')}
      </div>`;
    document.getElementById('podium').classList.remove('hidden');
  }

  // Table
  document.getElementById('ranking-table').innerHTML = `
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="text-gray-500 text-xs uppercase tracking-wide border-b border-white/5">
            <th class="px-5 py-3 text-left font-semibold">Rank</th>
            <th class="px-5 py-3 text-left font-semibold">Student</th>
            <th class="px-5 py-3 text-left font-semibold hidden sm:table-cell">Roll No.</th>
            <th class="px-5 py-3 text-center font-semibold">Score</th>
            <th class="px-5 py-3 text-center font-semibold hidden sm:table-cell">Percentile</th>
            <th class="px-5 py-3 text-center font-semibold">Status</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-white/4">
          ${data.map(r => `
            <tr class="transition-colors">
              <td class="px-5 py-4 font-bold">
                ${r.rank<=3
                  ? `<span class="text-xl">${medals[r.rank-1]}</span>`
                  : `<span class="text-gray-400 font-mono">#${r.rank}</span>`}
              </td>
              <td class="px-5 py-4">
                <p class="text-white font-semibold">${r.name||'Unknown'}</p>
              </td>
              <td class="px-5 py-4 text-gray-400 font-mono text-xs hidden sm:table-cell">
                ${r.roll_number||'—'}
              </td>
              <td class="px-5 py-4 text-center font-black text-yellow-400 text-lg">${r.total}</td>
              <td class="px-5 py-4 text-center text-indigo-400 hidden sm:table-cell">${r.percentile}%</td>
              <td class="px-5 py-4 text-center">
                <span class="px-2.5 py-0.5 rounded-full text-xs font-bold
                  ${r.pass ? 'bg-emerald-500/15 text-emerald-300 border border-emerald-500/25'
                           : 'bg-red-500/15 text-red-300 border border-red-500/25'}">
                  ${r.pass?'PASS':'FAIL'}
                </span>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}
loadRanking();
</script>
</body>
</html>
